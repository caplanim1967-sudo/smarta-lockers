<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smarta — כניסה למערכת</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c14;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3348;
  --accent: #4f8ef7;
  --accent2: #7c3aed;
  --green: #22c55e;
  --red: #ef4444;
  --text: #f0f2ff;
  --muted: #7b82a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  direction: rtl;
  position: relative;
  overflow: hidden;
}

/* Animated background blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.12;
  animation: float 8s ease-in-out infinite;
  pointer-events: none;
}
.blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -150px; animation-delay: 0s; }
.blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; animation-delay: -4s; }
@keyframes float {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(20px, 30px) scale(1.05); }
}

/* Card */
.card {
  position: relative;
  z-index: 10;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 48px;
  width: 400px;
  max-width: 95vw;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}

/* Logo */
.logo-wrap { text-align: center; margin-bottom: 8px; }
.logo {
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}
.logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; margin-bottom: 32px; text-align:center; }

/* Role badges preview */
.roles-preview {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.role-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Heebo', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus { border-color: var(--accent); }

.btn-login {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: 'Heebo', sans-serif;
  cursor: pointer;
  margin-top: 6px;
  transition: opacity 0.15s, transform 0.1s;
  position: relative;
}
.btn-login:hover { opacity: 0.9; }
.btn-login:active { transform: scale(0.98); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.err-box {
  display: none;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--red);
  margin-top: 12px;
  text-align: center;
}

.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-left: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.card-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--muted);
}
.card-footer strong { color: var(--text); font-weight: 600; }

/* Password eye toggle */
.pass-wrap { position: relative; }
.pass-wrap input { width: 100%; padding-left: 40px !important; }
.pass-eye {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 17px;
  color: var(--muted); padding: 0; line-height: 1;
}
.pass-eye:hover { color: var(--text); }

/* Forgot link */
.forgot-link {
  display: block; text-align: center; margin-top: 14px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  text-decoration: underline; text-decoration-color: transparent;
  transition: color 0.15s;
}
.forgot-link:hover { color: var(--accent); }

/* Forgot panel */
.forgot-panel {
  display: none; margin-top: 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
}
.forgot-panel.open { display: block; }
.forgot-panel label { font-size: 12px; color: var(--muted); font-weight: 600; display: block; margin-bottom: 6px; }
.forgot-panel input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:13px; font-family:'Heebo',sans-serif; outline:none; }
.forgot-panel input:focus { border-color:var(--accent); }
.forgot-panel .btn-send { width:100%; margin-top:10px; padding:10px; background:var(--accent); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:700; font-family:'Heebo',sans-serif; cursor:pointer; }
.forgot-panel .btn-send:hover { opacity:0.88; }
.forgot-ok { color: var(--green); font-size: 13px; text-align: center; margin-top: 10px; display:none; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo">Smarta</div>
    <div class="logo-sub">מערכת ניהול לוקרים חכמים</div>
  </div>

  <!-- Already-logged-in banner (shown only if session exists) -->
  <div id="session-banner" style="display:none;background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.25);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;">
    <div style="font-weight:700;color:var(--accent);margin-bottom:6px">מחובר כבר כ: <span id="session-name"></span></div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button onclick="continueSession()" style="flex:1;padding:8px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-weight:700;font-family:'Heebo',sans-serif;cursor:pointer;font-size:13px">המשך</button>
      <button onclick="clearSession()" style="flex:1;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Heebo',sans-serif;cursor:pointer;font-size:13px">החלף משתמש</button>
    </div>
  </div>

  <div class="form-group">
    <label>שם משתמש</label>
    <input type="text" id="username" placeholder="הכנס שם משתמש" autocomplete="off" autofocus>
  </div>
  <div class="form-group">
    <label>סיסמה</label>
    <div class="pass-wrap">
      <input type="password" id="password" placeholder="הכנס סיסמה" autocomplete="new-password">
      <button type="button" class="pass-eye" id="login-eye" onclick="toggleLoginEye()" title="הצג/הסתר סיסמה">👁</button>
    </div>
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">כניסה למערכת</button>
  <div class="err-box" id="err-box">שם משתמש או סיסמה שגויים</div>

  <span class="forgot-link" onclick="toggleForgot()">שכחתי שם משתמש / סיסמה</span>

  <div class="forgot-panel" id="forgot-panel">
    <label>שם משתמש או מספר נייד</label>
    <input type="text" id="forgot-input" dir="ltr" placeholder="הכנס שם משתמש או נייד">
    <button class="btn-send" onclick="sendForgot()">שלח לאיפוס →</button>
    <div class="forgot-ok" id="forgot-ok">✅ אם הפרטים קיימים במערכת — תשלח הודעה לנייד הרשום</div>
  </div>

  <div class="card-footer">
    גרסה 1.0 &nbsp;·&nbsp; <strong>Smarta Lockers</strong>
  </div>
</div>

<script>
var API_BASE = 'https://smarta-api.smarta-api.workers.dev';

// Role → tab key mapping
var ROLE_TAB = {
  smarta_admin:        'admin',
  community_manager:   'manager',
  mail_manager:        'app',
  courier:             'courier',
  finance:             'finance'
};

// Allowed tabs per role (others will be hidden in shell)
var ROLE_TABS = {
  smarta_admin:      ['app','manager','admin','courier','finance','test'],
  community_manager: ['manager'],
  mail_manager:      ['app'],
  courier:           ['courier'],
  finance:           ['finance']
};

function toggleLoginEye() {
  var inp = document.getElementById('password');
  var btn = document.getElementById('login-eye');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function toggleForgot() {
  var panel = document.getElementById('forgot-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('forgot-input').focus();
    document.getElementById('forgot-ok').style.display = 'none';
  }
}

function hashPassword(pass) {
  try {
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass))
      .then(function(buf) {
        return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
      });
  } catch(e) {
    return Promise.resolve('fallback:' + btoa(unescape(encodeURIComponent(pass))));
  }
}

function tryLocalLogin(username, password, errBox, btn) {
  try {
    var users = JSON.parse(localStorage.getItem('smarta_users') || '[]');
    var u = users.find(function(x) { return (x.username||'').toLowerCase().trim() === username.toLowerCase().trim(); });
    if (!u) {
      errBox.textContent = 'שם משתמש לא נמצא — פנה למנהל Smarta';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'כניסה למערכת';
      return;
    }
    if (!u.passwordHash) {
      errBox.textContent = 'המשתמש לא הוגדר כראוי — בקש ממנהל Smarta ליצור מחדש';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'כניסה למערכת';
      return;
    }
    var fallbackHash = 'fallback:' + btoa(unescape(encodeURIComponent(password)));
    hashPassword(password).then(function(hash) {
      var match = (hash === u.passwordHash) || (fallbackHash === u.passwordHash);
      if (!match) {
        errBox.textContent = 'סיסמה שגויה';
        errBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'כניסה למערכת';
        return;
      }
      // ✅ Local login success
      var role = u.role || 'community_manager';
      var settlements = JSON.parse(localStorage.getItem('smarta_settlements') || '[]');
      var settlement = settlements.find(function(s) { return s.id === u.community_id; });
      var communityName = (settlement && settlement.name) || u.community_id || '';
      var userObj = {
        full_name: [u.first_name, u.last_name].filter(Boolean).join(' ') || username,
        username: username,
        role: role,
        community_id: u.community_id,
        community_name: communityName
      };
      var fakeToken = 'local_' + u.id;
      sessionStorage.clear();
      sessionStorage.setItem('smarta_token', fakeToken);
      sessionStorage.setItem('smarta_role',  role);
      sessionStorage.setItem('smarta_user',  JSON.stringify(userObj));
      sessionStorage.setItem('smarta_tabs',  JSON.stringify(ROLE_TABS[role] || ['manager']));
      if (role === 'community_manager') {
        sessionStorage.setItem('manager_token', fakeToken);
        sessionStorage.setItem('manager_user',  JSON.stringify(userObj));
      }
      var tab = ROLE_TAB[role] || 'manager';
      window.location.href = './smarta-all-v2.html#' + tab;
    });
  } catch(e) {
    errBox.textContent = 'שגיאה בכניסה מקומית';
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'כניסה למערכת';
  }
}

function sendForgot() {
  var val = (document.getElementById('forgot-input').value || '').trim();
  if (!val) return;
  var okEl = document.getElementById('forgot-ok');
  fetch(API_BASE + '/api/auth/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ identifier: val })
  }).catch(function(){}).finally(function() {
    // Always show success message — don't reveal if user exists
    okEl.style.display = 'block';
    document.getElementById('forgot-input').value = '';
  });
}

document.getElementById('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

// Always reset form on page load (handles Back button + autofill)
window.addEventListener('pageshow', function() {
  var btn = document.getElementById('btn-login');
  btn.disabled = false;
  btn.textContent = 'כניסה למערכת';
  document.getElementById('username').value = '';
  var passEl = document.getElementById('password');
  passEl.value = ''; passEl.type = 'password';
  var eyeEl = document.getElementById('login-eye'); if(eyeEl) eyeEl.textContent = '👁';
  document.getElementById('err-box').style.display = 'none';
  var fp = document.getElementById('forgot-panel'); if(fp) fp.classList.remove('open');
});

function doLogin() {
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var errBox   = document.getElementById('err-box');
  var btn      = document.getElementById('btn-login');

  errBox.style.display = 'none';

  if (!username || !password) {
    errBox.textContent = 'יש למלא שם משתמש וסיסמה';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'מתחבר... <span class="spinner"></span>';

  fetch(API_BASE + '/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: username, password: password })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.token) {
      // אם ה-API החזיר שגיאה מפורשת (401 סיסמה/משתמש) — הצג אותה ישירות
      if (data.error) {
        errBox.textContent = data.error;
        errBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'כניסה למערכת';
        return;
      }
      // אחרת — נסה fallback מקומי (community_manager ב-localStorage)
      tryLocalLogin(username, password, errBox, btn);
      return;
    }

    var role = data.role;
    var user = {
      full_name:      data.name || username,
      username:       username,
      role:           role,
      community_name: data.community_name || ''
    };

    // ── Clear previous session, then set new one ─────────
    sessionStorage.clear();
    sessionStorage.setItem('smarta_token', data.token);
    sessionStorage.setItem('smarta_role',  role);
    sessionStorage.setItem('smarta_user',  JSON.stringify(user));
    sessionStorage.setItem('smarta_tabs',  JSON.stringify(ROLE_TABS[role] || ['app']));

    // ── Role-specific keys (used by each sub-page) ────────
    var t = data.token, u = JSON.stringify(user);
    if (role === 'community_manager') {
      sessionStorage.setItem('manager_token', t);
      sessionStorage.setItem('manager_user',  u);
    }
    if (role === 'mail_manager') {
      sessionStorage.setItem('app_token', t);
      sessionStorage.setItem('app_user',  u);
    }
    if (role === 'courier') {
      sessionStorage.setItem('courier_token', t);
      sessionStorage.setItem('courier_user',  u);
    }
    if (role === 'finance') {
      sessionStorage.setItem('finance_token', t);
      sessionStorage.setItem('finance_user',  u);
    }
    if (role === 'smarta_admin') {
      // Admin gets access to all sub-pages
      ['admin','manager','app','courier','finance'].forEach(function(k) {
        sessionStorage.setItem(k + '_token', t);
        sessionStorage.setItem(k + '_user',  u);
      });
    }

    // ── Redirect to shell with the right tab ──────────────
    var tab = ROLE_TAB[role] || 'app';
    window.location.href = './smarta-all-v2.html#' + tab;
  })
  .catch(function() {
    // Network error — try local users
    tryLocalLogin(username, password, errBox, btn);
  });
}

// Show session banner if already logged in (don't auto-redirect)
(function() {
  var role = sessionStorage.getItem('smarta_role');
  var token = sessionStorage.getItem('smarta_token');
  var user  = JSON.parse(sessionStorage.getItem('smarta_user') || 'null');
  if (role && token && user) {
    var banner = document.getElementById('session-banner');
    var nameEl = document.getElementById('session-name');
    nameEl.textContent = (user.full_name || user.username) + ' (' + (user.community_name || role) + ')';
    banner.style.display = 'block';
  }
})();

function continueSession() {
  var role = sessionStorage.getItem('smarta_role');
  window.location.href = './smarta-all-v2.html#' + (ROLE_TAB[role] || 'app');
}

function clearSession() {
  sessionStorage.clear();
  document.getElementById('session-banner').style.display = 'none';
  document.getElementById('username').focus();
}
</script>
</body>
</html>
